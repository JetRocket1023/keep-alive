name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 23 * * 0-4'   # 週一~週五 07:00 台灣時間
    - cron: '*/10 0-9 * * 1-5'  # 週一~週五 08:00~17:59 台灣時間
    - cron: '0 10 * * 1-5'      # 週一~週五 18:00 台灣時間
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: curl -s https://device-1vji.onrender.com
